<!DOCTYPE html>
<html>
<head>
  <title>Nishant's Profile</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.2);
      width: 350px;
      animation: fadeIn 1s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      border-radius: 50%;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 { font-size: 28px; margin-bottom: 5px; }
    .tag {
      background: #e94560;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 13px;
      display: inline-block;
      margin: 10px 0 20px;
    }
    .info { text-align: left; margin: 20px 0; }
    .info p {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 15px;
    }
    .info span { color: #e94560; font-weight: bold; }
    .btn {
      background: linear-gradient(135deg, #e94560, #c62a47);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s;
    }
    .btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👨‍💻</div>
    <h1>Nishant</h1>
    <div class="tag">BCA Student 🎓</div>
    <div class="info">
      <p><span>📍 City:</span> Kathmandu, Nepal</p>
      <p><span>💻 Learning:</span> Python & Web Dev</p>
      <p><span>🎯 Goal:</span> Full Stack Developer</p>
      <p><span>⚡ Day:</span> 1 of coding journey!</p>
    </div>
    <button class="btn" onclick="alert('Keep coding Nishant! 🚀')">Click Me!</button>
  </div>
</body>
</html>
